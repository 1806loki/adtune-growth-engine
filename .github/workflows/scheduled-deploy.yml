name: One-Time Vercel Deploy

on:
  schedule:
    # May 3, 23:35 IST → 18:00 UTC (GitHub Actions cron is UTC only)
    - cron: '05 18 3 5 *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}